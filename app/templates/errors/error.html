<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>{{ title }} — {{ app_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" style="text-align:center">
    <div class="brand">
      <h1 style="font-size:64px;color:var(--c-orange);margin:0">{{ code }}</h1>
      <div class="accent"></div>
      <h2 style="color:var(--c-navy);margin:18px 0 8px">{{ title }}</h2>
      <p style="color:var(--c-muted);margin:0 0 22px">{{ msg }}</p>
    </div>
    <a href="{{ url_for('dashboard.home') if current_user.is_authenticated else url_for('auth.login') }}"
       class="btn btn-navy" style="width:100%;justify-content:center;padding:12px">
      {{ 'العودة إلى لوحة المعلومات' if current_user.is_authenticated else 'العودة إلى تسجيل الدخول' }}
    </a>
  </div>
</div>
</body>
</html>
