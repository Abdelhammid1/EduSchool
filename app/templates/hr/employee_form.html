{% extends "partials/base.html" %}
{% block title %}موظف جديد{% endblock %}
{% block content %}
<div class="page-title">
  <div><h2>{% if employee %}تعديل: {{ employee.full_name }}{% else %}موظف جديد{% endif %}</h2></div>
  <a href="{{ url_for('hr.employees_list') }}" class="btn btn-ghost">رجوع</a>
</div>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <h3>البيانات الأساسية</h3>
    <div class="form-row cols-2">
      <div class="field"><label>الاسم الكامل</label>
        <input name="full_name" required value="{{ employee.full_name if employee else '' }}">
      </div>
      <div class="field"><label>الوظيفة</label>
        <input name="job_title" required value="{{ employee.job_title if employee else '' }}">
      </div>
    </div>
    <div class="form-row cols-3">
      <div class="field"><label>الراتب الأساسي</label>
        <input name="base_salary" type="number" step="0.01" min="0" value="{{ employee.base_salary if employee else '0' }}">
      </div>
      <div class="field"><label>رقم الهوية</label>
        <input name="national_id" value="{{ employee.national_id or '' if employee else '' }}">
      </div>
      <div class="field"><label>تاريخ التعيين</label>
        <input name="hire_date" type="date" value="{{ employee.hire_date or '' if employee else '' }}">
      </div>
    </div>
    <div class="form-row cols-3">
      <div class="field"><label>الهاتف</label>
        <input name="phone" value="{{ employee.phone or '' if employee else '' }}">
      </div>
      <div class="field"><label>البريد</label>
        <input name="email" type="email" value="{{ employee.email or '' if employee else '' }}">
      </div>
      <div class="field"><label>الحساب البنكي</label>
        <input name="bank_account" value="{{ employee.bank_account or '' if employee else '' }}">
      </div>
    </div>
    <div class="field"><label>ربط بحساب مستخدم (اختياري)</label>
      <select name="user_id">
        <option value="">— لا يوجد —</option>
        {% for u in users %}<option value="{{ u.id }}">{{ u.full_name }} ({{ u.username }})</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="mt-2 flex">
    <button class="btn btn-primary" type="submit">حفظ</button>
    <a href="{{ url_for('hr.employees_list') }}" class="btn btn-ghost">إلغاء</a>
  </div>
</form>
{% endblock %}
