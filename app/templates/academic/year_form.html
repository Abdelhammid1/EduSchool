{% extends "partials/base.html" %}
{% block title %}سنة دراسية جديدة{% endblock %}
{% block content %}
<div class="page-title">
  <div><h2>سنة دراسية جديدة</h2></div>
  <a href="{{ url_for('academic.years_list') }}" class="btn btn-ghost">رجوع</a>
</div>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <div class="form-row cols-3">
      <div class="field"><label>اسم السنة</label>
        <input name="name" required placeholder="مثل: 2025-2026">
      </div>
      <div class="field"><label>تاريخ البداية</label>
        <input name="start_date" type="date" required>
      </div>
      <div class="field"><label>تاريخ النهاية</label>
        <input name="end_date" type="date" required>
      </div>
    </div>
    <div class="field">
      <label>الحالة</label>
      <select name="status">
        <option value="active">نشطة (الحالية)</option>
        <option value="closed">مغلقة</option>
      </select>
      <div class="hint">لا يمكن تفعيل أكثر من سنة في وقت واحد. أغلق السابقة قبل تفعيل الجديدة.</div>
    </div>
  </div>
  <div class="mt-2 flex">
    <button class="btn btn-primary" type="submit">حفظ</button>
    <a href="{{ url_for('academic.years_list') }}" class="btn btn-ghost">إلغاء</a>
  </div>
</form>
{% endblock %}
