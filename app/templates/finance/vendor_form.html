{% extends "partials/base.html" %}
{% block title %}مورد جديد{% endblock %}
{% block content %}
<div class="page-title">
  <div><h2>مورد جديد</h2></div>
  <a href="{{ url_for('finance.vendors_list') }}" class="btn btn-ghost">رجوع</a>
</div>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <div class="form-row cols-2">
      <div class="field"><label>اسم المورد</label>
        <input name="name" required>
      </div>
      <div class="field"><label>الهاتف</label>
        <input name="phone">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="field"><label>البريد</label>
        <input name="email" type="email">
      </div>
      <div class="field"><label>العنوان</label>
        <input name="address">
      </div>
    </div>
  </div>
  <div class="mt-2 flex">
    <button class="btn btn-primary" type="submit">حفظ</button>
    <a href="{{ url_for('finance.vendors_list') }}" class="btn btn-ghost">إلغاء</a>
  </div>
</form>
{% endblock %}
