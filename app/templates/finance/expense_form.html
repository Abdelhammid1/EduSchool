{% extends "partials/base.html" %}
{% block title %}مصروف جديد{% endblock %}
{% block content %}
<div class="page-title">
  <div><h2>مصروف جديد</h2><div class="sub">يُولّد قيد محاسبي تلقائي</div></div>
  <a href="{{ url_for('finance.expenses_list') }}" class="btn btn-ghost">رجوع</a>
</div>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <div class="form-row cols-3">
      <div class="field"><label>التاريخ</label>
        <input name="date" type="date" required>
      </div>
      <div class="field"><label>المبلغ</label>
        <input name="amount" type="number" step="0.01" min="0.01" required>
      </div>
      <div class="field"><label>المورد (اختياري)</label>
        <select name="vendor_id">
          <option value="">— لا يوجد —</option>
          {% for v in vendors %}<option value="{{ v.id }}">{{ v.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="field"><label>حساب المصروف</label>
        <select name="expense_account_id" required>
          {% for a in exp_accounts %}<option value="{{ a.id }}">{{ a.code }} — {{ a.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="field"><label>الحساب النقدي (من أين الدفع)</label>
        <select name="cash_account_id" required>
          {% for a in cash_accounts %}<option value="{{ a.id }}">{{ a.code }} — {{ a.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="field"><label>الوصف</label>
        <input name="description" required>
      </div>
      <div class="field"><label>مرجع (اختياري)</label>
        <input name="reference">
      </div>
    </div>
  </div>
  <div class="mt-2 flex">
    <button class="btn btn-primary" type="submit">حفظ وقيد محاسبيًا</button>
  </div>
</form>
{% endblock %}
