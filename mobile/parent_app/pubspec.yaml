name: manasety_parent
description: تطبيق ولي الأمر — منصتي (مؤسسة الشيخ صالح الشريف للتعليم القرآني)
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  go_router: ^14.2.0

  dio: ^5.4.0
  pretty_dio_logger: ^1.4.0

  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0

  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2

  intl: ^0.20.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: launcher_icon
  ios: true
  image_path: "assets/images/logo-emblem.png"
  min_sdk_android: 23
  adaptive_icon_background: "#001556"
  adaptive_icon_foreground: "assets/images/logo-emblem.png"
  remove_alpha_ios: true
